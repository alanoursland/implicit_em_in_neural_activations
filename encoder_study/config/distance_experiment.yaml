model:
  input_dim: 784
  hidden_dim: 64

sae:
  l1_weight: 0.01

infomax:
  lambda_lse: 1.0
  lambda_var: 1.0
  lambda_tc: 1.0
  lambda_wr: 0.0
  variance_eps: 1.0e-6

training:
  epochs: 100
  pretrain_epochs: 50
  phase_epochs: 50
  batch_size: 128
  lr: 0.001
  infomax_weight: 0.1  # Weight for InfoMax regularizer in Condition 2
  ema_decay: 0.9  # Decay for convergence EMA (higher = smoother)

data:
  dataset: mnist
  data_dir: "E:/ml_datasets"

seeds: [1, 2, 3]
